name: CI

on:
  push:
    branches:
      - main
      - master
      - "release/**"
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests

      - name: Ruff format
        run: ruff format --check src tests

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (default user path) and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pip-audit

      - name: Audit default install
        run: pip-audit --strict

      - name: Install and audit development extras
        run: |
          pip install -e ".[dev]"
          pip-audit --strict

  test:
    runs-on: ubuntu-latest
    # OIDC upload to Codecov via the installed GitHub App (no CODECOV_TOKEN).
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Tests with coverage
        run: >-
          pytest tests/
          --cov=padelpy
          --cov-report=term-missing
          --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        # Pin full commit SHA; tag v5.5.5.
        # https://github.com/codecov/codecov-action/releases/tag/v5.5.5
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac
        with:
          files: coverage.xml
          flags: ubuntu
          name: ubuntu-py3.12
          use_oidc: true
          # Keep false until OIDC uploads are confirmed green.
          fail_ci_if_error: false

  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Smoke tests
        run: pytest tests/ -q

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with docs extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Sphinx build (warnings as errors)
        run: sphinx-build -W -b html docs/source docs/_build/html
