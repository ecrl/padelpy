name: CodeQL

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        # Pin full commit SHA; tag v3.37.3.
        # https://github.com/github/codeql-action/releases/tag/v3.37.3
        uses: github/codeql-action/init@4187e74d05793876e9989daffde9c3e66b4acd07
        with:
          languages: python
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@4187e74d05793876e9989daffde9c3e66b4acd07
        with:
          category: "/language:python"
